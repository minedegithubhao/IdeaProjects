<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>主页</title>
    <link rel="stylesheet" type="text/css" href="../js/jquery-easyui-1.4.1/themes/bootstrap/easyui.css">
    <link rel="stylesheet" type="text/css" href="../js/jquery-easyui-1.4.1/themes/icon.css">
    <link rel="stylesheet" type="text/css" href="../js/jquery-easyui-1.4.1/demo/demo.css">
    <link rel="stylesheet" type="text/css" href="../css/common.css">
    <script type="text/javascript" src="../js/jquery-easyui-1.4.1/jquery.min.js"></script>
    <script type="text/javascript" src="../js/jquery-easyui-1.4.1/jquery.easyui.min.js"></script>
    <script type="text/javascript" src="../html/main.js"></script>
</head>
<body class="easyui-layout" id="layout" style="visibility:hidden;">

<div data-options="region:'north'" id="header">
<!--    <img src="img/logo.png" class="logo" />-->
    <div class="top-buttons">
        <span>欢迎您，管理员</span>
        <a href="#" class="easyui-linkbutton" data-options="plain:true,iconCls:'icon-lock'">修改密码</a>
        <a href="#" class="easyui-linkbutton" data-options="plain:true,iconCls:'icon-clear'">退出系统</a>
    </div>
</div>

<div data-options="region:'west',split:true" title="导航菜单" id="navBar">
    <div class="easyui-accordion" data-options="fit:true" id="navMenu">
        <div title="指标体系">
            <ul class="navMenu">
<!--                <li class="active"><a href="#">首页</a></li>-->
                <li><a data-url="system/user/index">用户管理</a></li>
                <li><a data-url="system/role/index">角色管理</a></li>
            </ul>
        </div>
        <div title="绩效考核"></div>
    </div>
</div>

<div data-options="region:'center'" id="content">
    <div id="tt" class="easyui-tabs" data-options="fit:true"></div>
</div>
<div id="footer" data-options="region:'south'">数据资源管理系统</div>
</body>
</html>
